<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crazy Discgolf - Legal & Support</title>
    <style>
      :root {
        --bg: #f5fbff;
        --card: #ffffff;
        --text: #1f2a37;
        --muted: #526070;
        --accent: #0b7a75;
        --border: #d8e6ee;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: linear-gradient(180deg, #eef8ff 0%, var(--bg) 100%);
        color: var(--text);
      }
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 28px 16px 60px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        margin-top: 14px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
        margin: 0;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      ul {
        margin: 10px 0 0;
        padding-left: 18px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Crazy Discgolf</h1>
      <p>Official legal and support pages for the iOS app.</p>

      <section class="card">
        <h2>Privacy Policy</h2>
        <p>How data is handled in Crazy Discgolf.</p>
        <ul>
          <li><a href="./privacy/">Open Privacy Policy</a></li>
        </ul>
      </section>

      <section class="card">
        <h2>Support</h2>
        <p>Need help, found a bug, or have a feature request?</p>
        <ul>
          <li><a href="./support/">Open Support Page</a></li>
          <li>
            <a href="https://github.com/fooaldrin/crazydiscgolf/issues"
              >GitHub Issues</a
            >
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
